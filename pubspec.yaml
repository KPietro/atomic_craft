name: atomic_craft
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.35.1

dev_dependencies:
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true

assets:
   - assets/logo.png
   
flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png" 
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo.png"